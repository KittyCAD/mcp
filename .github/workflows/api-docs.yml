name: api-docs

permissions:
  contents: read

on:
  pull_request:
    paths:
      - '.github/workflows/api-docs.yml'
      - 'Dockerfile.api-docs'
      - 'docs/zoo-api-docs*.md'
      - 'pyproject.toml'
      - 'scripts/smoke_api_docs.py'
      - 'src/zoo_mcp/__init__.py'
      - 'src/zoo_mcp/authenticated_runtime.py'
      - 'src/zoo_mcp/api_docs/**'
      - 'tests/data/api_docs_retrieval_eval.json'
      - 'tests/test_api_docs_*.py'
      - 'uv.lock'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version-file: pyproject.toml

      - name: Install the project
        run: uv sync --frozen --dev

      - name: Run documentation server tests and retrieval evaluation
        run: uv run pytest tests/test_api_docs_*.py

      - name: Smoke-test the source entrypoint without credentials
        run: uv run python scripts/smoke_api_docs.py

      - name: Build the wheel
        run: uv build --wheel

      - name: Smoke-test the installed wheel without credentials
        shell: bash
        run: |
          uv venv --python 3.13 /tmp/zoo-api-docs-wheel
          uv pip install --python /tmp/zoo-api-docs-wheel/bin/python dist/*.whl
          /tmp/zoo-api-docs-wheel/bin/python scripts/smoke_api_docs.py \
            /tmp/zoo-api-docs-wheel/bin/zoo-api-docs

      - name: Build the OCI image
        run: docker build --file Dockerfile.api-docs --tag zoo-api-docs:smoke .

      - name: Smoke-test health and Streamable HTTP
        shell: bash
        run: |
          docker run --detach --name zoo-api-docs-smoke \
            --publish 127.0.0.1:18080:8000 zoo-api-docs:smoke
          cleanup() {
            docker logs zoo-api-docs-smoke
            docker rm --force zoo-api-docs-smoke >/dev/null
          }
          trap cleanup EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:18080/healthz \
              | jq --exit-status '.ready == true' >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo 'Zoo API Docs container did not become ready' >&2
              exit 1
            fi
            sleep 1
          done
          uv run python scripts/smoke_api_docs.py \
            --url http://127.0.0.1:18080/api-docs/mcp
