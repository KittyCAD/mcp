name: release

on:
  push:
    tags:
      - '*'

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install the project
        run: uv sync --dev

      - name: Build Wheels
        run: uv build --wheel

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels
          path: dist/*

  build-binaries:
    name: Build binary (${{ matrix.os_label }}-${{ matrix.arch_label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os_label: linux
            arch_label: x86_64
            ext: ""
          - runner: ubuntu-24.04-arm
            os_label: linux
            arch_label: arm64
            ext: ""
          - runner: macos-15
            os_label: macos
            arch_label: arm64
            ext: ""
          - runner: macos-15-intel
            os_label: macos
            arch_label: x86_64
            ext: ""
          - runner: windows-latest
            os_label: windows
            arch_label: x86_64
            ext: ".exe"
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install the project
        run: uv sync --no-dev

      - name: Build binary
        shell: bash
        run: |
          uv run --with pyinstaller pyinstaller \
            --onefile --name zoo-mcp \
            --copy-metadata zoo_mcp \
            --collect-all mcp --collect-all kcl --collect-all kittycad \
            --collect-all trimesh --collect-all truststore \
            pyinstaller_entry.py

      - name: Rename binary
        shell: bash
        run: |
          mv "dist/zoo-mcp${{ matrix.ext }}" \
            "dist/zoo-mcp-${{ matrix.os_label }}-${{ matrix.arch_label }}${{ matrix.ext }}"

      - name: Smoke test the binary
        shell: bash
        run: |
          python scripts/smoke_launch.py \
            "./dist/zoo-mcp-${{ matrix.os_label }}-${{ matrix.arch_label }}${{ matrix.ext }}"

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.os_label }}-${{ matrix.arch_label }}
          path: dist/zoo-mcp-${{ matrix.os_label }}-${{ matrix.arch_label }}${{ matrix.ext }}

  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    needs: [ build, build-binaries ]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Create a Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/wheels/*
            dist/binary-*/*

  publish-pyx:
    name: Publish to pyx
    runs-on:
      - runs-on=${{ github.run_id }}
      - runner=8cpu-linux-x64
    needs: [ build ]
    permissions:
      id-token: write # for Trusted Publishing to pyx
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          name: wheels
          path: dist

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - uses: astral-sh/pyx-auth-action@91cba5589c19c6e57e4688208832a1ffd60f9044 # v0.0.10
        id: auth
        with:
          url: https://api.pyx.dev/v1/upload/zoo/main

      - name: "Publish to pyx"
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Publish all built wheels to the configured index
          uv publish dist/*
        env:
          UV_PUBLISH_URL: ${{ steps.auth.outputs.url }}
          UV_PUBLISH_TOKEN: ${{ steps.auth.outputs.token }}

  publish-pypi:
    name: Publish to pypi
    runs-on:
      - runs-on=${{ github.run_id }}
      - runner=8cpu-linux-x64
    needs: [ build ]
    permissions:
      contents: read
    env:
      UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          name: wheels
          path: dist

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: "Publish to pypi"
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Publish all built wheels to the configured index
          uv publish --trusted-publishing=never dist/*

  publish-mcp-registry:
    name: Publish to https://registry.modelcontextprotocol.io
    runs-on:
      - runs-on=${{ github.run_id }}
      - runner=8cpu-linux-x64
    needs: [ publish-pypi ]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Set version in server.json
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          jq --arg v "$VERSION" '.version = $v' server.json > server.tmp && mv server.tmp server.json

      - name: Wait for publish to PyPI
        run: sleep 60s

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
