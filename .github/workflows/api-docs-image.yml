name: api-docs-image

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/api-docs-image.yml'
      - 'Dockerfile.api-docs'
      - 'pyproject.toml'
      - 'src/zoo_mcp/__init__.py'
      - 'src/zoo_mcp/authenticated_runtime.py'
      - 'src/zoo_mcp/api_docs/**'
      - 'uv.lock'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: api-docs-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version-file: pyproject.toml

      - name: Validate the candidate index
        run: |
          uv sync --frozen --dev
          uv run pytest tests/test_api_docs_*.py
          uv run python scripts/smoke_api_docs.py

      - name: Read the index revision
        id: index
        run: |
          echo "revision=$(jq --raw-output '.index_revision' \
            src/zoo_mcp/api_docs/data/index.json)" >> "$GITHUB_OUTPUT"

      - name: Build the smoke image
        run: docker build --file Dockerfile.api-docs --tag zoo-api-docs:smoke .

      - name: Smoke-test the image
        shell: bash
        run: |
          docker run --detach --name zoo-api-docs-smoke \
            --publish 127.0.0.1:18080:8000 zoo-api-docs:smoke
          cleanup() {
            docker logs zoo-api-docs-smoke
            docker rm --force zoo-api-docs-smoke >/dev/null
          }
          trap cleanup EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:18080/healthz \
              | jq --exit-status \
                --arg revision '${{ steps.index.outputs.revision }}' \
                '.ready == true and .index_revision == $revision' >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo 'Zoo API Docs container did not become ready' >&2
              exit 1
            fi
            sleep 1
          done
          uv run python scripts/smoke_api_docs.py \
            --url http://127.0.0.1:18080/api-docs/mcp

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Push the immutable candidate image
        id: push
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile.api-docs
          push: true
          tags: ghcr.io/kittycad/zoo-api-docs:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            zoo.api-docs.index-revision=${{ steps.index.outputs.revision }}

      - name: Record the immutable image digest
        env:
          IMAGE_DIGEST: ${{ steps.push.outputs.digest }}
          INDEX_REVISION: ${{ steps.index.outputs.revision }}
        run: |
          {
            echo '## Zoo API Docs candidate'
            echo
            echo "- Image: \`ghcr.io/kittycad/zoo-api-docs@$IMAGE_DIGEST\`"
            echo "- Index: \`$INDEX_REVISION\`"
          } >> "$GITHUB_STEP_SUMMARY"
