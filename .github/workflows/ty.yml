name: ty
permissions:
  contents: read
on:
  pull_request:
    paths:
      - '**.py'
      - ty.yml
      - 'pyproject.toml'
jobs:
  ty:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version-file: "pyproject.toml"

      - name: Install the project
        run: uv sync --dev

      - name: Run ty
        shell: bash
        run: |
          uv run ty check
